<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi Posición GPS en Mapa</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }
    #label {
      padding: 10px;
      font-size: 1.2em;
      text-align: center;
    }
    #map {
      height: 90vh;
      width: 100%;
    }
  </style>
</head>
<body>

  <div id="label">Obteniendo ubicación...</div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const label = document.getElementById('label');

    const map = L.map('map').setView([32.4639, -116.8817], 20);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 22,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const marker = L.circleMarker([0, 0], {
      radius: 8,
      color: 'red',
      fillColor: '#f03',
      fillOpacity: 0.9
    }).addTo(map);

    function updatePosition(position) {
      const lat = position.coords.latitude;
      const lon = position.coords.longitude;

      label.textContent = `Latitud: ${lat.toFixed(6)} | Longitud: ${lon.toFixed(6)}`;
      marker.setLatLng([lat, lon]);
      map.setView([lat, lon], map.getZoom());
    }

    function errorHandler(error) {
      label.textContent = 'Error obteniendo ubicación: ' + error.message;
    }

    if (navigator.geolocation) {
      navigator.geolocation.watchPosition(updatePosition, errorHandler, {
        enableHighAccuracy: true
      });
    } else {
      label.textContent = "Tu navegador no soporta geolocalización.";
    }

    // Coordenadas de la imagen (10 m x 10 m, esquina inferior izquierda)
    const southWest = L.latLng(32.463942, -116.881704);
    const northEast = L.latLng(32.464032, -116.881597);
    const bounds = L.latLngBounds(southWest, northEast);

    // Añadir imagen superpuesta
    L.imageOverlay('layout.png', bounds).addTo(map);
  </script>

</body>
</html>
